<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Culinary Chronicles</title>

    <!-- Only ONE Bootstrap CSS (fix also done) -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #ffedcc;
            color: #333;
            padding-top: 70px;
        }

        .navbar {
            background-color: #CB202D;
        }

        .navbar-brand {
            color: #fff !important;
            font-size: 1.8rem;
            font-weight: bold;
        }

        .nav-link {
            color: #fff !important;
        }

        .nav-link:hover {
            color: #ffcc5c !important;
        }

        .menu-link {
            color: #ffcc5c;
            font-weight: bold;
            font-style: italic;
            font-size: 1.2rem;
        }

        .search-container {
            margin: 20px;
            text-align: center;
        }

        .search-container input,
        .search-container select {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ddd;
        }

        .category-title {
            font-size: 1.5rem;
            margin: 20px 0 10px;
        }

        .category-section {
            display: flex;
            overflow-x: auto;
        }

        .recipe {
            background-color: #fff;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            margin: 15px;
            flex: 0 0 250px;
        }

        .recipe img {
            border-radius: 10px;
            margin-bottom: 15px;
            height: 150px;
            width: 150px;
        }

        .recipe button {
            background-color: #CB202D;
            color: #fff;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
        }

        .footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 20px 0;
            margin-top: 50px;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <a class="navbar-brand" href="#">Culinary Chronicles</a>

    <!-- Static navbar (no toggle) -->
    <div class="navbar-collapse">
        <ul class="navbar-nav ml-auto">
            <li class="nav-item">
                <a class="nav-link menu-link" href="menu.html">Recipes</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="about.html">About Us</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="contact.html">Contact Us</a>
            </li>
        </ul>
    </div>
</nav>

<header>
    <h1 class="text-center my-4">Delicious Chinese Recipes</h1>
</header>

<div class="search-container">
    <!-- Static (no JS functionality) -->
    <input type="text" placeholder="Search (disabled)">
    <select>
        <option>All</option>
        <option>Veg</option>
        <option>Non-Veg</option>
    </select>
</div>

<div class="container">

    <h2 class="category-title">Starters</h2>
    <div class="category-section">

        <div class="recipe">
            <img src="/images/spring roll.jpg">
            <h3>Spring Rolls</h3>
            <button>View Recipe</button>
        </div>

        <div class="recipe">
            <img src="/images/dumplings.jpg">
            <h3>Dumplings</h3>
            <button>View Recipe</button>
        </div>

        <div class="recipe">
            <img src="/images/chicken wings.jpeg">
            <h3>Chicken Wings</h3>
            <button>View Recipe</button>
        </div>

    </div>

    <h2 class="category-title">Main Course</h2>
    <div class="category-section">

        <div class="recipe">
            <img src="/images/fried rice.jpeg">
            <h3>Fried Rice</h3>
            <button>View Recipe</button>
        </div>

        <div class="recipe">
            <img src="/images/kung pao.jpeg">
            <h3>Kung Pao Chicken</h3>
            <button>View Recipe</button>
        </div>

    </div>

</div>

<footer class="footer">
    <p>&copy; 2024 Culinary Chronicles. All Rights Reserved.</p>
</footer>

</body>
</html>
